# Fluorite Configuration

meta_key		= Mod4			# Default "Master" key
follow_windows	= false			# Follow windows to their new workspace
force_floating 	= false			# Force windows to open in float
warp_cursor    	= false			# Warp cursor to focused window
jump_to_urgent 	= true			# Show workspace where windows that requires attention is
starting_layout = "cascade"		# cascade, dwm, centered, stacked

# Workspaces names that will show in Polybar or tint2 for example
workspaces_names = {
	"I",
	"II",
	"III",
	"IV",
	"V",
	"VI",
	"VII",
	"VIII",
	"IX",
	"X"
}

# Windows that will open in float by default
floating_windows = {
	"spacefm",
	"spectacle",
	"spotify",
	"thunar",
	"ymuse",
	"force_float",
	"steam",
	"steamwebhelper",
	"st_music"
}

# Windows that will open in fixed by default (like Polybar do)
fixed_windows = {
	"Conky"
}

# Windows that can swallow gui app (mostly terminals)
swallowing_windows = {
	"st",
	"kitty",
	"Alacritty"
}

# App/Scripts Execution
bind "Mod4+Return"				{ action = "exec" arg = "st" }
bind "Mod4+w"					{ action = "exec" arg = "firefox" }
bind "Mod4+t"					{ action = "exec" arg = "~/tools/suckless_tools/scripts/fluorite_theme.sh" }
bind "Mod4+d"					{ action = "exec" arg = "dmenu_run_desktop" }
bind "Mod4+Print"				{ action = "exec" arg = "~/tools/suckless_tools/scripts/print_screen.sh" }
bind "Mod4+Shift+d" 			{ action = "exec" arg = "dmenu_run" }
bind "Mod4+Shift+e" 			{ action = "exec" arg = "elogind-inhibit --what=sleep xsecurelock" }
bind "Mod4+Shift+p" 			{ action = "exec" arg = "~/tools/suckless_tools/scripts/dmenu_polybar_style.sh" }
bind "Mod4+Shift+f" 			{ action = "exec" arg = "~/tools/suckless_tools/scripts/st_font.sh font" }
bind "Mod4+Ctrl+f"				{ action = "exec" arg = "~/tools/suckless_tools/scripts/st_font.sh" }
bind "Mod4+Shift+t" 			{ action = "exec" arg = "~/tools/suckless_tools/scripts/dmenu_xresources.sh" }
bind "Mod4+Ctrl+h"				{ action = "exec" arg = "~/tools/suckless_tools/scripts/dmenu_hdmiplug.sh" }
bind "XF86MonBrightnessUp"		{ action = "exec" arg = "brightnessctl set 5%+" }
bind "XF86MonBrightnessDown"	{ action = "exec" arg = "brightnessctl set 5%-" }
bind "XF86AudioRaiseVolume"		{ action = "exec" arg = "pactl set-sink-volume @DEFAULT_SINK@ +5%" }
bind "XF86AudioLowerVolume"		{ action = "exec" arg = "pactl set-sink-volume @DEFAULT_SINK@ -5%" }
bind "XF86AudioMute"			{ action = "exec" arg = "pactl set-sink-mute @DEFAULT_SINK@ toggle" }
bind "XF86Favorites"			{ action = "exec" arg = "st -c st_music -g 100x30 mocp" }
bind "XF86AudioMicMute"			{ action = "exec" arg = "pactl set-source-mute 1 toggle && pactl set-source-mute 2 toggle" }

# Workspaces
bind "Mod4+ampersand"			{ action = "show_workspace" arg =  1 }
bind "Mod4+eacute"				{ action = "show_workspace" arg =  2 }
bind "Mod4+quotedbl"			{ action = "show_workspace" arg =  3 }
bind "Mod4+apostrophe"			{ action = "show_workspace" arg =  4 }
bind "Mod4+parenleft"			{ action = "show_workspace" arg =  5 }
bind "Mod4+minus"				{ action = "show_workspace" arg =  6 }
bind "Mod4+egrave"				{ action = "show_workspace" arg =  7 }
bind "Mod4+underscore"			{ action = "show_workspace" arg =  8 }
bind "Mod4+ccedilla"			{ action = "show_workspace" arg =  9 }
bind "Mod4+agrave"				{ action = "show_workspace" arg = 10 }
bind "Mod4+Shift+ampersand"		{ action = "send_window_to_workspace" arg =  1 }
bind "Mod4+Shift+eacute"		{ action = "send_window_to_workspace" arg =  2 }
bind "Mod4+Shift+quotedbl"		{ action = "send_window_to_workspace" arg =  3 }
bind "Mod4+Shift+apostrophe"	{ action = "send_window_to_workspace" arg =  4 }
bind "Mod4+Shift+parenleft"		{ action = "send_window_to_workspace" arg =  5 }
bind "Mod4+Shift+minus"			{ action = "send_window_to_workspace" arg =  6 }
bind "Mod4+Shift+egrave"		{ action = "send_window_to_workspace" arg =  7 }
bind "Mod4+Shift+underscore"	{ action = "send_window_to_workspace" arg =  8 }
bind "Mod4+Shift+ccedilla"		{ action = "send_window_to_workspace" arg =  9 }
bind "Mod4+Shift+agrave"		{ action = "send_window_to_workspace" arg = 10 }
bind "Mod4+Ctrl+j"				{ action = "focus_prev_workspace" }
bind "Mod4+Ctrl+m" 				{ action = "focus_next_workspace" }
bind "Mod4+Ctrl+Shift+j"		{ action = "send_window_prev_workspace" }
bind "Mod4+Ctrl+Shift+m" 		{ action = "send_window_next_workspace" }

# Window management
bind "Mod4+k"					{ action = "window_rotate" arg = "up" }
bind "Mod4+l" 					{ action = "window_rotate" arg = "down" }
bind "Mod4+j" 					{ action = "focus_prev_window" }
bind "Mod4+m" 					{ action = "focus_next_window" }
bind "Mod4+space"				{ action = "tile_window" }
bind "Mod4+s"					{ action = "change_layout" arg = "stacked" }
bind "Mod4+f" 					{ action = "toggle_fullscreen" }
bind "Mod4+r" 					{ action = "cycle_layouts" }
bind "Mod4+c" 					{ action = "change_layout" arg = "centered" }
bind "Mod4+ugrave"				{ action = "hide_show_scratchpad" }
bind "Mod4+h"					{ action = "toggle_fixed_strut" }
bind "Mod4+comma"				{ action = "focus_next_monitor" }
bind "Mod4+Shift+k"				{ action = "stack_rotate" arg = "up" }
bind "Mod4+Shift+l" 			{ action = "stack_rotate" arg = "down" }
bind "Mod4+Shift+j" 			{ action = "change_master_offset" arg = "up" }
bind "Mod4+Shift+m" 			{ action = "change_master_offset" arg = "down" }
bind "Mod4+Shift+Return"		{ action = "swap_with_master" }
bind "Mod4+Shift+q"				{ action = "close_window" }
bind "Mod4+Shift+Escape"		{ action = "close_fluorite" }
bind "Mod4+Shift+space"			{ action = "hide_show_floating" }
bind "Mod4+Shift+ugrave"		{ action = "add_window_scratchpad" }
bind "Mod4+Ctrl+space"			{ action = "tile_all" }
bind "Mod4+Ctrl+ugrave"			{ action = "del_window_scratchpad" }
bind "Mod4+Alt+ugrave"			{ action = "center_scratchpad_window" }
