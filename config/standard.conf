# Fluorite Configuration

meta_key		= Mod4			# Default "Master" key
follow_windows	= false			# Follow windows to their new workspace
force_floating 	= false			# Force windows to open in float
warp_cursor    	= false			# Warp cursor to focused window
jump_to_urgent 	= true			# Show workspace where windows that requires attention is
starting_layout = "cascade"		# cascade, dwm, centered, stacked

# Workspaces names that will show in Polybar or tint2 for example
workspaces_names = {
	"1",
	"2",
	"3",
	"4",
	"5",
	"6",
	"7",
	"8",
	"9",
	"0"
}

# Windows that will open in float by default
floating_windows = {
	"spacefm",
	"spectacle",
	"thunar",
}

# Windows that will open in fixed by default (like Polybar do)
fixed_windows = {
	"Conky"
}

# Windows that can swallow gui app (mostly terminals)
swallowing_windows = {
	"st",
	"kitty",
	"Alacritty"
}

# App/Scripts Execution
bind "Mod4+Return"				{ action = "exec" arg = "alacritty" }
bind "Mod4+w"					{ action = "exec" arg = "firefox" }
bind "Mod4+d"					{ action = "exec" arg = "dmenu_run_desktop" }
bind "Mod4+Shift+d" 			{ action = "exec" arg = "dmenu_run" }
bind "Mod4+Shift+e" 			{ action = "exec" arg = "elogind-inhibit --what=sleep xsecurelock" }
bind "XF86MonBrightnessUp"		{ action = "exec" arg = "brightnessctl set 5%+" }
bind "XF86MonBrightnessDown"	{ action = "exec" arg = "brightnessctl set 5%-" }
bind "XF86AudioRaiseVolume"		{ action = "exec" arg = "pactl set-sink-volume @DEFAULT_SINK@ +5%" }
bind "XF86AudioLowerVolume"		{ action = "exec" arg = "pactl set-sink-volume @DEFAULT_SINK@ -5%" }
bind "XF86AudioMute"			{ action = "exec" arg = "pactl set-sink-mute @DEFAULT_SINK@ toggle" }
bind "XF86AudioMicMute"			{ action = "exec" arg = "pactl set-source-mute 1 toggle && pactl set-source-mute 2 toggle" }

# Workspaces
bind "Mod4+1"				{ action = "show_workspace" arg =  1 }
bind "Mod4+2"				{ action = "show_workspace" arg =  2 }
bind "Mod4+3"				{ action = "show_workspace" arg =  3 }
bind "Mod4+4"				{ action = "show_workspace" arg =  4 }
bind "Mod4+5"				{ action = "show_workspace" arg =  5 }
bind "Mod4+6"				{ action = "show_workspace" arg =  6 }
bind "Mod4+7"				{ action = "show_workspace" arg =  7 }
bind "Mod4+8"				{ action = "show_workspace" arg =  8 }
bind "Mod4+9"				{ action = "show_workspace" arg =  9 }
bind "Mod4+0"				{ action = "show_workspace" arg = 10 }
bind "Mod4+Shift+1"			{ action = "send_window_to_workspace" arg =  1 }
bind "Mod4+Shift+2"			{ action = "send_window_to_workspace" arg =  2 }
bind "Mod4+Shift+3"			{ action = "send_window_to_workspace" arg =  3 }
bind "Mod4+Shift+4"			{ action = "send_window_to_workspace" arg =  4 }
bind "Mod4+Shift+5"			{ action = "send_window_to_workspace" arg =  5 }
bind "Mod4+Shift+6"			{ action = "send_window_to_workspace" arg =  6 }
bind "Mod4+Shift+7"			{ action = "send_window_to_workspace" arg =  7 }
bind "Mod4+Shift+8"			{ action = "send_window_to_workspace" arg =  8 }
bind "Mod4+Shift+9"			{ action = "send_window_to_workspace" arg =  9 }
bind "Mod4+Shift+0"			{ action = "send_window_to_workspace" arg = 10 }
bind "Mod4+Ctrl+h"			{ action = "focus_prev_workspace" }
bind "Mod4+Ctrl+l" 			{ action = "focus_next_workspace" }
bind "Mod4+Ctrl+Shift+h"	{ action = "send_window_prev_workspace" }
bind "Mod4+Ctrl+Shift+l"	{ action = "send_window_next_workspace" }

# Window management
bind "Mod4+j"				{ action = "window_rotate" arg = "up" }
bind "Mod4+k" 				{ action = "window_rotate" arg = "down" }
bind "Mod4+h" 				{ action = "focus_prev_window" }
bind "Mod4+l" 				{ action = "focus_next_window" }
bind "Mod4+space"			{ action = "tile_window" }
bind "Mod4+s"				{ action = "change_layout" arg = "stacked" }
bind "Mod4+f" 				{ action = "toggle_fullscreen" }
bind "Mod4+r" 				{ action = "cycle_layouts" }
bind "Mod4+c" 				{ action = "change_layout" arg = "centered" }
bind "Mod4+m"				{ action = "hide_show_scratchpad" }
bind "Mod4+g"				{ action = "toggle_fixed_strut" }
bind "Mod4+comma"			{ action = "focus_next_monitor" }
bind "Mod4+Shift+j"			{ action = "stack_rotate" arg = "up" }
bind "Mod4+Shift+k" 		{ action = "stack_rotate" arg = "down" }
bind "Mod4+Shift+h" 		{ action = "change_master_offset" arg = "up" }
bind "Mod4+Shift+l" 		{ action = "change_master_offset" arg = "down" }
bind "Mod4+Shift+Return"	{ action = "swap_with_master" }
bind "Mod4+Shift+q"			{ action = "close_window" }
bind "Mod4+Shift+Escape"	{ action = "close_fluorite" }
bind "Mod4+Shift+space"		{ action = "hide_show_floating" }
bind "Mod4+Shift+m"			{ action = "add_window_scratchpad" }
bind "Mod4+Ctrl+space"		{ action = "tile_all" }
bind "Mod4+Ctrl+m"			{ action = "del_window_scratchpad" }
bind "Mod4+Alt+m"			{ action = "center_scratchpad_window" }
